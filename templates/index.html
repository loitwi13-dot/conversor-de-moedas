<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Moedas Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-dark text-white text-center">
                        <h4>Conversor de Moedas</h4>
                    </div>
                    <div class="card-body">
                        <form id="form-conversao">
                            <div class="mb-3">
                                <label for="valor" class="form-label">Valor</label>
                                <input type="number" class="form-control" id="valor" step="0.01" required>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="origem" class="form-label">De (Ex: USD)</label>
                                    <input type="text" class="form-control" id="origem" maxlength="3" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="destino" class="form-label">Para (Ex: BRL)</label>
                                    <input type="text" class="form-control" id="destino" maxlength="3" required>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Converter</button>
                        </form>
                        
                        <div id="resultado-box" class="mt-4 text-center d-none">
                            <h2 id="valor-resultado" class="text-success"></h2>
                            <p id="taxa-info" class="text-muted small"></p>
                        </div>
                        <div id="erro-box" class="mt-3 alert alert-danger d-none"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
